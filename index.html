<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Easter Edition</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdfcf0; /* Light Cream */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #5a5a5a;
        }
        .container {
            text-align: center;
            padding: 3rem;
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 4px solid #b8e1ff; /* Pastel Blue border */
        }
        h1 {
            color: #ffb7b2; /* Pastel Pink */
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        p {
            color: #b2e2f2; /* Pastel Blue/Cyan */
            font-size: 1.2rem;
            font-weight: bold;
        }
        .accent {
            color: #c7ceea; /* Pastel Purple */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello World!</h1>
        <p>This is a simple <span class="accent">Easter-themed</span> website.</p>
        <p style="color: #baffc9;">Ready for GitHub Pages! 🐣</p>
    </div>
</body>
</html>
