<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGMT342 - Professor Humphrey</title>
    <style>
        body {
            background-color: #000000; /* Black */
            color: #FFFFFF; /* White text for contrast */
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
            border-top: 10px solid #FB4F14; /* Bengals Orange */
        }
        h1 {
            color: #FB4F14; /* Bengals Orange */
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        .subheader {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 3rem;
        }
        .player-list {
            background-color: #1a1a1a;
            padding: 2rem;
            border-radius: 10px;
            border: 2px solid #FB4F14;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 4px 15px rgba(251, 79, 20, 0.3);
        }
        h2 {
            color: #FB4F14;
            margin-top: 0;
            text-align: center;
            border-bottom: 1px solid #FB4F14;
            padding-bottom: 0.5rem;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            padding: 0.75rem 0;
            border-bottom: 1px solid #333;
            font-size: 1.1rem;
        }
        li:last-child {
            border-bottom: none;
        }
        strong {
            color: #FB4F14;
        }
    </style>
</head>
<body>
    <h1>Hello World</h1>
    <div class="subheader">MGMT342 - Professor Humphrey</div>
    
    <div class="player-list">
        <h2>Bengals Legends</h2>
        <ul>
            <li><strong>Anthony Muñoz</strong> - Hall of Fame Offensive Tackle</li>
            <li><strong>Ken Anderson</strong> - 1981 NFL MVP & QB</li>
            <li><strong>Boomer Esiason</strong> - 1988 NFL MVP & QB</li>
            <li><strong>Chad Johnson</strong> - Franchise Leading Receiver</li>
            <li><strong>Joe Burrow</strong> - Super Bowl QB & Modern Icon</li>
        </ul>
    </div>
</body>
</html>
